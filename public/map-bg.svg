<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <!-- Coordinates: x=(lon+180)*3.333, y=(90-lat)*4.444 -->

  <defs>
    <pattern id="g10" x="0" y="0" width="33.33" height="44.44" patternUnits="userSpaceOnUse">
      <path d="M 33.33 0 L 0 0 0 44.44" fill="none" stroke="#B8AFA0" stroke-width="0.35"/>
    </pattern>
  </defs>

  <!-- Ocean -->
  <rect width="1200" height="800" fill="#D8D0C4"/>

  <!-- ── Continent fills ── -->
  <g fill="#C8BBAA" stroke="#8A7A68" stroke-width="0.9" stroke-linejoin="round">

    <!-- North America -->
    <path d="M 50,111 L 183,187 L 210,257 L 250,302 L 323,360
             L 310,333 L 300,320 L 277,284 L 300,267 L 333,289
             L 350,244 L 367,209 L 417,191 L 417,169 L 383,124
             L 317,76 L 267,76 L 167,98 L 130,133 Z"/>

    <!-- Greenland -->
    <path d="M 357,64 L 460,22 L 517,31 L 540,80 L 520,124 L 457,133 L 393,111 Z"/>

    <!-- South America -->
    <path d="M 353,356 L 400,364 L 440,400 L 483,418 L 487,444
             L 470,502 L 430,551 L 393,609 L 377,649 L 360,609
             L 347,556 L 343,502 L 350,444 L 333,400 Z"/>

    <!-- Eurasia (Europe + Asia as one landmass) -->
    <path d="M 570,236 L 600,204 L 607,169 L 633,147 L 650,89
             L 693,84 L 800,98 L 867,76 L 933,76 L 1067,76
             L 1070,178 L 1050,244 L 1007,289 L 967,396 L 933,396
             L 900,369 L 867,360 L 820,298 L 800,289
             L 750,231 L 720,236 L 673,236 L 653,231 L 600,231 Z"/>

    <!-- Africa -->
    <path d="M 580,240 L 633,236 L 683,258 L 717,267 L 740,333
             L 770,351 L 767,378 L 740,418 L 723,480 L 717,511
             L 693,556 L 660,556 L 647,529 L 637,480
             L 610,382 L 583,378 L 557,373 L 543,338
             L 543,307 L 557,276 Z"/>

    <!-- Australia -->
    <path d="M 980,498 L 1037,453 L 1083,444 L 1110,524
             L 1103,551 L 1067,569 L 1010,556 L 983,551 Z"/>

    <!-- Antarctica (rough band) -->
    <path d="M 0,756 Q 200,736 400,740 Q 600,730 800,738 Q 1000,730 1200,750 L 1200,800 L 0,800 Z"/>

    <!-- New Zealand (rough) -->
    <path d="M 1130,587 L 1140,569 L 1147,578 L 1137,596 Z"/>

    <!-- Japan (rough) -->
    <path d="M 1053,196 L 1060,187 L 1070,200 L 1060,213 Z"/>

    <!-- UK (rough) -->
    <path d="M 590,169 L 597,156 L 607,162 L 600,178 Z"/>

    <!-- Iceland -->
    <path d="M 523,107 L 543,98 L 553,111 L 540,120 Z"/>

  </g>

  <!-- Grid overlay on top of continents -->
  <rect width="1200" height="800" fill="url(#g10)" opacity="0.55"/>

  <!-- Major grid every 30° longitude -->
  <g stroke="#9E9080" stroke-width="0.7" opacity="0.55">
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
    <!-- Major latitude every 30° -->
    <line x1="0" y1="133.3" x2="1200" y2="133.3"/>
    <line x1="0" y1="266.7" x2="1200" y2="266.7"/>
    <line x1="0" y1="533.3" x2="1200" y2="533.3"/>
    <line x1="0" y1="666.7" x2="1200" y2="666.7"/>
  </g>

  <!-- Prime meridian -->
  <line x1="600" y1="0" x2="600" y2="800" stroke="#6A5A4A" stroke-width="1.2" opacity="0.6"/>

  <!-- Arctic / Antarctic circles (66.5°) -->
  <line x1="0" y1="104.4" x2="1200" y2="104.4" stroke="#9E9080" stroke-width="0.6" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="0" y1="695.6" x2="1200" y2="695.6" stroke="#9E9080" stroke-width="0.6" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- Tropics (23.5°) -->
  <line x1="0" y1="295.6" x2="1200" y2="295.6" stroke="#B8962E" stroke-width="0.9" stroke-dasharray="14,6" opacity="0.5"/>
  <line x1="0" y1="504.4" x2="1200" y2="504.4" stroke="#B8962E" stroke-width="0.9" stroke-dasharray="14,6" opacity="0.5"/>

  <!-- Degree labels -->
  <g font-family="Georgia,serif" font-size="8.5" fill="#6A5A4A" opacity="0.6" font-style="italic">
    <text x="5" y="130">60°N</text>
    <text x="5" y="264">30°N</text>
    <text x="5" y="530">30°S</text>
    <text x="5" y="663">60°S</text>
    <text x="5" y="292">23°N</text>
    <text x="5" y="502">23°S</text>
    <text x="97"  y="793" text-anchor="middle">150°W</text>
    <text x="297" y="793" text-anchor="middle">90°W</text>
    <text x="497" y="793" text-anchor="middle">30°W</text>
    <text x="697" y="793" text-anchor="middle">30°E</text>
    <text x="897" y="793" text-anchor="middle">90°E</text>
    <text x="1097" y="793" text-anchor="middle">150°E</text>
  </g>

  <!-- Compass rose (bottom-right) -->
  <g transform="translate(1118,690)" opacity="0.75">
    <circle cx="0" cy="0" r="36" fill="none" stroke="#6A5A4A" stroke-width="1"/>
    <circle cx="0" cy="0" r="9" fill="none" stroke="#6A5A4A" stroke-width="0.8"/>
    <path d="M 0,-36 L -7,-12 L 7,-12 Z" fill="#4A3F35"/>
    <path d="M 0,36 L -7,12 L 7,12 Z" fill="#9E9080"/>
    <path d="M 36,0 L 12,-7 L 12,7 Z" fill="#9E9080"/>
    <path d="M -36,0 L -12,-7 L -12,7 Z" fill="#9E9080"/>
    <path d="M 22,-22 L 5,-11 L 11,-5 Z" fill="#C8BFB0"/>
    <path d="M -22,-22 L -11,-5 L -5,-11 Z" fill="#C8BFB0"/>
    <path d="M 22,22 L 11,5 L 5,11 Z" fill="#C8BFB0"/>
    <path d="M -22,22 L -5,11 L -11,5 Z" fill="#C8BFB0"/>
    <circle cx="0" cy="0" r="4.5" fill="#4A3F35"/>
    <circle cx="0" cy="0" r="2" fill="#D8D0C4"/>
    <text x="0" y="-41" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#4A3F35" font-style="italic">N</text>
  </g>

  <!-- Border -->
  <rect width="1200" height="800" fill="none" stroke="#9E9080" stroke-width="2" opacity="0.3"/>

</svg>
